name: Daily Elite Feishu Doc Push

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read and increment day counter
        id: counter
        run: |
          if [ ! -f state.json ]; then
            echo '{"day":0}' > state.json
          fi

          DAY=$(jq -r '.day' state.json)
          NEW_DAY=$((DAY+1))

          echo "{\"day\":$NEW_DAY}" > state.json
          echo "day=$NEW_DAY" >> $GITHUB_OUTPUT

      - name: Commit updated day
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add state.json
          git commit -m "Day ${{ steps.counter.outputs.day }}" || true
          git push || true

      - name: Generate content from DeepSeek
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |
          PROMPT="你是我的终极认知架构师。今天是第${DAY}天。请输出：今日主题、核心材料、核心模型、现实映射、侃侃而谈示范、输出任务。高密度，不鸡汤。"

          JSON=$(jq -n --arg p "$PROMPT" '{model:"deepseek-chat",messages:[{role:"user",content:$p}],temperature:0.7}')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$JSON")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          echo "$CONTENT" > content.txt

      - name: Get Feishu Access Token
        id: token
        env:
          APP_ID: ${{ secrets.FEISHU_APP_ID }}
          APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$APP_ID\",\"app_secret\":\"$APP_SECRET\"}")

          TOKEN=$(echo "$RESPONSE" | jq -r '.tenant_access_token')

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Create Feishu Document
        id: doc
        env:
          TOKEN: ${{ steps.token.outputs.token }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |
          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/docx/v1/documents \
            -H "Authorization: Bearer $TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"title\":\"📚 认知升级 Day ${DAY}\"}")

          DOC_ID=$(echo "$RESPONSE" | jq -r '.data.document.document_id')

          echo "docid=$DOC_ID" >> $GITHUB_OUTPUT

      - name: Send document link to Feishu
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DOC_ID: ${{ steps.doc.outputs.docid }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |
          LINK="https://feishu.cn/docx/${DOC_ID}"

          PAYLOAD=$(jq -n \
            --arg text "【认知】📚 Day ${DAY}\n\n云文档已生成：\n${LINK}" \
            '{msg_type:"text",content:{text:$text}}')

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
