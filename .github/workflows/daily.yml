name: Daily Elite Markdown Push

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read and increment day counter
        id: counter
        run: |
          if [ ! -f state.json ]; then
            echo '{"day":0}' > state.json
          fi

          DAY=$(jq -r '.day' state.json)
          NEW_DAY=$((DAY+1))

          echo "{\"day\":$NEW_DAY}" > state.json

          echo "day=$NEW_DAY" >> $GITHUB_OUTPUT

      - name: Commit updated day
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add state.json

          git commit -m "Day ${{ steps.counter.outputs.day }}" || true

          git push || true

      - name: Generate markdown content
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |

          PROMPT="иҜ·з”ҹжҲҗдёҖд»Ҫй«ҳиҙЁйҮҸ Markdown ж јејҸи®ӨзҹҘж—ҘжҠҘгҖӮеҢ…еҗ«пјҡж ҮйўҳгҖҒд»Ҡж—Ҙдё»йўҳгҖҒж ёеҝғжЁЎеһӢгҖҒзҺ°е®һжҳ е°„гҖҒдҫғдҫғиҖҢи°ҲзӨәиҢғгҖҒиҫ“еҮәд»»еҠЎгҖӮжҺ’зүҲжё…жҷ°гҖӮ"

          JSON=$(jq -n --arg p "$PROMPT" '{model:"deepseek-chat",messages:[{role:"user",content:$p}],temperature:0.7}')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$JSON")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          echo "$CONTENT" > report.md

      - name: Get Feishu Access Token
        id: token
        env:
          APP_ID: ${{ secrets.FEISHU_APP_ID }}
          APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |

          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/auth/v3/tenant_access_token/internal \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"$APP_ID\",\"app_secret\":\"$APP_SECRET\"}")

          echo "$RESPONSE"

          TOKEN=$(echo "$RESPONSE" | jq -r '.tenant_access_token')

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload markdown file
        id: upload
        env:
          TOKEN: ${{ steps.token.outputs.token }}
        run: |

          RESPONSE=$(curl -s -X POST https://open.feishu.cn/open-apis/drive/v1/files/upload_all \
            -H "Authorization: Bearer $TOKEN" \
            -F "file_name=report.md" \
            -F "parent_type=explorer" \
            -F "size=$(wc -c < report.md)" \
            -F "file=@report.md")

          echo "$RESPONSE"

          FILE_TOKEN=$(echo "$RESPONSE" | jq -r '.data.file_token')

          echo "filetoken=$FILE_TOKEN" >> $GITHUB_OUTPUT

      - name: Send file link to Feishu
        env:
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          FILE_TOKEN: ${{ steps.upload.outputs.filetoken }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |

          LINK="https://www.feishu.cn/file/${FILE_TOKEN}"

          PAYLOAD=$(jq -n \
            --arg text "гҖҗи®ӨзҹҘгҖ‘рҹ“ҡ Day ${DAY}\n\nMarkdown ж–Үд»¶е·Із”ҹжҲҗпјҡ\n${LINK}" \
            '{msg_type:"text",content:{text:$text}}')

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
