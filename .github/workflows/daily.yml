name: Daily Elite DeepSeek Push

on:
  schedule:
    - cron: '30 13 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read and increment day counter
        id: counter
        run: |
          if [ ! -f state.json ]; then
            echo '{"day":0}' > state.json
          fi
          DAY=$(jq -r '.day' state.json)
          NEW_DAY=$((DAY+1))
          echo "{\"day\":$NEW_DAY}" > state.json
          echo "day=$NEW_DAY" >> $GITHUB_OUTPUT

      - name: Commit updated day
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git commit -m "Day ${{ steps.counter.outputs.day }}" || true
          git push || true

      - name: Generate and push
        env:
          API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          WEBHOOK: ${{ secrets.FEISHU_WEBHOOK }}
          DAY: ${{ steps.counter.outputs.day }}
        run: |
          WEEKDAY=$(date -u +%u)
          EXTRA=""
          if [ "$WEEKDAY" -eq 7 ]; then
            EXTRA="今天是周复盘日，请加入：本周核心模型总结、3个复杂议题、跨学科测试、认知盲区。"
          fi

          PROMPT="你是我的终极认知架构师。今天是第${DAY}天。按阶段递进：思维基础→文明→资本科技→权力组织→哲学原典→综合现实。输出：1.今日主题 2.核心材料（具体章节或文章） 3.核心模型（3-6个） 4.高密度摘要 5.现实映射 6.侃侃而谈示范 7.输出任务。${EXTRA}要求高密度不鸡汤具体到章节难度递增。"

          JSON=$(jq -n --arg p "$PROMPT" '{model:"deepseek-chat",messages:[{role:"user",content:$p}],temperature:0.7}')

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $API_KEY" \
            -d "$JSON")

          CONTENT=$(echo "$RESPONSE" | jq -r '.choices[0].message.content')

          TITLE="📚 认知升级 Day ${DAY}"

          FEISHU=$(jq -n --arg t "${TITLE}" --arg c "${CONTENT}" '{msg_type:"text",content:{text:($t + "\n\n" + $c)}}')

          curl -s -X POST "$WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$FEISHU"
