name: Daily Elite DeepSeek Push

on:
  schedule:
    - cron: '30 13 * * *'   # 每天北京时间21:30（UTC 13:30）
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      - name: Read and increment day counter
        id: counter
        run: |
          if [ ! -f state.json ]; then
            echo '{"day": 0}' > state.json
          fi

          DAY=$(jq -r '.day' state.json)
          NEW_DAY=$((DAY+1))
          echo "{\"day\": $NEW_DAY}" > state.json
          echo "day=$NEW_DAY" >> $GITHUB_OUTPUT

      - name: Commit updated day
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add state.json
          git commit -m "Day ${{ steps.counter.outputs.day }}" || echo "No changes to commit"
          git push || echo "No push needed"

      - name: Generate content from DeepSeek and push to Feishu
        run: |
          DAY=${{ steps.counter.outputs.day }}
          WEEKDAY=$(date -u +%u)

          if [ "$WEEKDAY" -eq 7 ]; then
            EXTRA="今天是周复盘日。请额外加入：本周核心模型总结、我应该能讲清的3个复杂议题、一个跨学科现实测试、可能的认知盲区。"
          else
            EXTRA=""
          fi

          cat <<EOF > prompt.txt
你是我的终极认知架构师。
今天是第${DAY}天。
按阶段自动递进（思维基础→文明→资本科技→权力组织→哲学原典→综合现实）。

输出结构必须包括：
【今日主题】
【核心材料（具体章节/文章/播客）】
【核心模型（3-6个）】
【高密度摘要】
【现实映射】
【侃侃而谈示范（自然表达）】
【输出任务】

${EXTRA}

要求：
- 高密度
- 不鸡汤
- 具体到章节或标题
- 难度随天数递增
EOF

          RESPONSE=$(curl -s https://api.deepseek.com/v1/chat/completions \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DEEPSEEK_API_KEY }}" \
            -d "{
              \"model\": \"deepseek-chat\",
              \"messages\": [
                {\"role\": \"user\", \"content\": \"$(cat prompt.txt | sed 's/"/\\"/g')\"}
              ],
              \"temperature\": 0.7
            }")

          CONTENT=$(echo $RESPONSE | jq -r '.choices[0].message.content')

          curl -X POST ${{ secrets.FEISHU_WEBHOOK }} \
            -H "Content-Type: application/json" \
            -d "{\"msg_type\":\"text\",\"content\":{\"text\":\"📚 认知升级 Day ${DAY}\n\n$CONTENT\"}}"
